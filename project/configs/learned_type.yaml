paths:
  dataset_root: ../math_datasets
  output_root: ./outputs

llm:
  backend: mock
  model_name: gpt-4o-mini
  api_base: ""
  api_key_env: OPENAI_API_KEY
  temperature: 0.2

kb:
  min_validation_score: 0.55
  use_validation: true
  use_advanced_generation: true

retrieval:
  top_k: 4
  alpha_type: 0.45
  alpha_question: 0.35
  alpha_experience: 0.10
  alpha_quality: 0.10
  use_quality: true
  refine: true

type_abstractor:
  provider: hybrid
  artifact_dir: ./outputs/type_abstractor
  top_k_candidates: 3
  coarse_threshold: 0.55
  fine_threshold: 0.45
  fallback_to_rule: true
  train:
    encoder_name: sentence-transformers/all-mpnet-base-v2
    normalize_embeddings: true
    min_samples_per_fine_type: 1

evaluation:
  modes:
    - zero_shot
    - type_only
    - experience_only
    - full
  max_eval_samples: 100
